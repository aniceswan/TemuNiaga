<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400" role="img" aria-label="Kriteria juri dan bobot">
  <rect width="900" height="400" fill="#020617"/>

  <text x="40" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Kriteria Juri &amp; Bobot Penilaian</text>
  <text x="40" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">Dampak Strategis bobot tertinggi (1,5). Rumus: siapa terbantu + apa berubah + berapa besar + berapa lama.</text>

  <!-- bar chart -->
  <g transform="translate(40,96)" font-family="Segoe UI, sans-serif">
    <!-- Dampak Strategis -->
    <text x="0" y="20" font-size="12" font-weight="700" fill="#ef4444">Dampak Strategis</text>
    <rect x="180" y="6" width="450" height="24" rx="4" fill="#7f1d1a" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="180" y="6" width="450" height="24" rx="4" fill="#ef4444" opacity="0.7"/>
    <text x="640" y="22" font-size="16" font-weight="800" fill="#fecaca">1,5</text>
    <text x="680" y="22" font-size="10" fill="#ef4444">← tertinggi</text>

    <!-- Inovasi -->
    <text x="0" y="60" font-size="12" font-weight="600" fill="#94a3b8">Inovasi &amp; Kebaruan</text>
    <rect x="180" y="46" width="300" height="24" rx="4" fill="#1e293b" stroke="#334155"/>
    <text x="490" y="62" font-size="16" font-weight="800" fill="#cbd5e1">1,0</text>

    <!-- Kelayakan Teknis -->
    <text x="0" y="100" font-size="12" font-weight="600" fill="#94a3b8">Kelayakan Teknis (MVP)</text>
    <rect x="180" y="86" width="300" height="24" rx="4" fill="#1e293b" stroke="#334155"/>
    <text x="490" y="102" font-size="16" font-weight="800" fill="#cbd5e1">1,0</text>

    <!-- Kualitas Tim -->
    <text x="0" y="140" font-size="12" font-weight="600" fill="#94a3b8">Kualitas Tim</text>
    <rect x="180" y="126" width="150" height="24" rx="4" fill="#1e293b" stroke="#334155"/>
    <text x="340" y="142" font-size="16" font-weight="800" fill="#cbd5e1">0,5</text>
  </g>

  <!-- format pitch -->
  <g transform="translate(40,260)">
    <rect x="0" y="0" width="820" height="120" rx="12" fill="#0b1220" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="20" y="28" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fde68a">📋 Format Pitch Wajib (Mentor)</text>
    <text x="20" y="52" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">Masalah > Bukti > Baseline > Target > Dampak</text>
    <text x="20" y="76" font-family="Segoe UI, sans-serif" font-size="12" fill="#94a3b8">Rumus dampak: <tspan fill="#fbbf24" font-weight="600">siapa terbantu + apa yang berubah + berapa besar + dalam berapa lama</tspan></text>
    <text x="20" y="98" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Contoh kuat: "312 petani + harga terima naik + 15% + dalam 6 bulan > +Rp218 juta/tahun ke desa"</text>
  </g>
</svg>
