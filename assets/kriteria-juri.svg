<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-label="Kriteria penilaian resmi TOR">
  <rect width="900" height="420" fill="#020617"/>

  <text x="40" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Kriteria Penilaian Resmi (TOR Kemenkop 2026)</text>
  <text x="40" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">Sumber: Term of Reference Hackathon Digital Cooperatives Expo 2026, Bagian I. Total 100%.</text>

  <!-- Bar chart -->
  <g transform="translate(40,96)" font-family="Segoe UI, sans-serif">
    
    <!-- Relevansi 25% -->
    <text x="0" y="20" font-size="12" font-weight="700" fill="#22c55e">Relevansi dengan Permasalahan</text>
    <rect x="300" y="6" width="560" height="24" rx="4" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="300" y="6" width="560" height="24" rx="4" fill="#22c55e" opacity="0.7"/>
    <text x="870" y="22" font-size="16" font-weight="800" fill="#86efac" text-anchor="end">25%</text>
    <text x="278" y="22" font-size="10" fill="#22c55e" text-anchor="end">tertinggi</text>

    <!-- Inovasi 20% -->
    <text x="0" y="60" font-size="12" font-weight="600" fill="#e2e8f0">Inovasi dan Kreativitas</text>
    <rect x="300" y="46" width="448" height="22" rx="4" fill="#1e293b" stroke="#3b82f6"/>
    <rect x="300" y="46" width="448" height="22" rx="4" fill="#3b82f6" opacity="0.6"/>
    <text x="758" y="61" font-size="14" font-weight="800" fill="#93c5fd" text-anchor="end">20%</text>

    <!-- Dampak 20% -->
    <text x="0" y="96" font-size="12" font-weight="600" fill="#e2e8f0">Dampak dan Manfaat</text>
    <rect x="300" y="82" width="448" height="22" rx="4" fill="#1e293b" stroke="#fbbf24"/>
    <rect x="300" y="82" width="448" height="22" rx="4" fill="#fbbf24" opacity="0.6"/>
    <text x="758" y="97" font-size="14" font-weight="800" fill="#fcd34d" text-anchor="end">20%</text>

    <!-- Implementasi 15% -->
    <text x="0" y="132" font-size="12" font-weight="600" fill="#e2e8f0">Kemudahan Implementasi</text>
    <rect x="300" y="118" width="336" height="22" rx="4" fill="#1e293b" stroke="#a78bfa"/>
    <rect x="300" y="118" width="336" height="22" rx="4" fill="#a78bfa" opacity="0.6"/>
    <text x="646" y="133" font-size="14" font-weight="800" fill="#c4b5fd" text-anchor="end">15%</text>

    <!-- Kualitas 15% -->
    <text x="0" y="168" font-size="12" font-weight="600" fill="#e2e8f0">Kualitas Teknologi dan Solusi</text>
    <rect x="300" y="154" width="336" height="22" rx="4" fill="#1e293b" stroke="#38bdf8"/>
    <rect x="300" y="154" width="336" height="22" rx="4" fill="#38bdf8" opacity="0.6"/>
    <text x="646" y="169" font-size="14" font-weight="800" fill="#bae6fd" text-anchor="end">15%</text>

    <!-- Presentasi 5% -->
    <text x="0" y="204" font-size="12" font-weight="600" fill="#94a3b8">Presentasi dan Pitch</text>
    <rect x="300" y="190" width="112" height="22" rx="4" fill="#1e293b" stroke="#64748b"/>
    <rect x="300" y="190" width="112" height="22" rx="4" fill="#64748b" opacity="0.6"/>
    <text x="422" y="205" font-size="14" font-weight="800" fill="#cbd5e1" text-anchor="end">5%</text>
  </g>

  <!-- Insight box -->
  <g transform="translate(40,320)">
    <rect x="0" y="0" width="820" height="80" rx="12" fill="#0b1220" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="28" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#86efac">Relevansi masalah = 45% total bobot (Relevansi 25% + Dampak 20%)</text>
    <text x="20" y="50" font-family="Segoe UI, sans-serif" font-size="12" fill="#94a3b8">Problem yang valid, data-driven, dan dampak terukur adalah 45% penilaian. Sisanya: inovasi 20%, kemudahan implementasi 15%, kualitas teknis 15%, pitch 5%.</text>
    <text x="20" y="68" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">Sumber: TOR Hackathon Kemenkop 2026, Bagian I. Berbeda dari slide mentorship — ini dokumen resmi.</text>
  </g>
</svg>
