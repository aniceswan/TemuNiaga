<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" role="img" aria-label="Proyeksi skala">
  <rect width="800" height="380" fill="#020617"/>

  <text x="40" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Proyeksi Skala: Jumlah Kopdes vs Dampak Ekonomi</text>
  <text x="40" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8">Dari 10 Kopdes pilot ke 24.000 nasional. Semua dalam rupiah per tahun (skenario moderat, rate konversi 60%).</text>

  <g transform="translate(40,100)">
    <!-- Grid -->
    <g stroke="#1e293b" stroke-width="0.5">
      <line x1="0" y1="240" x2="640" y2="240"/>
      <line x1="0" y1="180" x2="640" y2="180"/>
      <line x1="0" y1="120" x2="640" y2="120"/>
      <line x1="0" y1="60" x2="640" y2="60"/>
      <line x1="0" y1="0" x2="640" y2="0"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="240" x2="660" y2="240" stroke="#475569" stroke-width="1"/>
    <line x1="0" y1="240" x2="0" y2="0" stroke="#475569" stroke-width="1"/>

    <!-- Y-axis -->
    <g font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b" text-anchor="end">
      <text x="-8" y="244">0</text>
      <text x="-8" y="184">Rp 5 T</text>
      <text x="-8" y="124">Rp 10 T</text>
      <text x="-8" y="64">Rp 15 T</text>
      <text x="-8" y="12">Rp 20 T</text>
    </g>

    <!-- X-axis -->
    <g font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">
      <text x="0" y="256">10</text>
      <text x="160" y="256">50</text>
      <text x="320" y="256">500</text>
      <text x="480" y="256">5.000</text>
      <text x="640" y="256">24.000 Kopdes</text>
    </g>

    <!-- Curve: kenaikan farmgate -->
    <polyline points="0,237 160,233 320,192 480,96 640,8"
      fill="none" stroke="#22c55e" stroke-width="2.5"/>
    
    <!-- Curve: SHU -->
    <polyline points="0,239 160,235 320,212 480,144 640,72"
      fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6 3"/>

    <!-- Legend -->
    <g transform="translate(480,20)" font-family="Segoe UI, sans-serif" font-size="10">
      <line x1="0" y1="8" x2="30" y2="8" stroke="#22c55e" stroke-width="2.5"/>
      <text x="40" y="12" fill="#86efac">Kenaikan farmgate petani</text>
      <line x1="0" y1="26" x2="30" y2="26" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="6 3"/>
      <text x="40" y="30" fill="#fcd34d">SHU dibagikan</text>
    </g>

    <!-- Phase markers -->
    <g font-family="Segoe UI, sans-serif" font-size="9" fill="#64748b">
      <rect x="-2" y="242" width="162" height="18" rx="4" fill="#0b1220" stroke="#1e293b"/>
      <text x="80" y="255" text-anchor="middle">Th 1: Pilot 10 Kopdes</text>

      <rect x="140" y="242" width="180" height="18" rx="4" fill="#0b1220" stroke="#1e293b"/>
      <text x="230" y="255" text-anchor="middle">Th 2: Skalasi 50 Kopdes</text>

      <rect x="280" y="242" width="160" height="18" rx="4" fill="#0b1220" stroke="#1e293b"/>
      <text x="360" y="255" text-anchor="middle">Th 3: Regional 500 Kopdes</text>

      <rect x="460" y="242" width="200" height="18" rx="4" fill="#0b1220" stroke="#1e293b"/>
      <text x="560" y="255" text-anchor="middle">Th 5: Nasional 24.000 Kopdes</text>
    </g>

    <!-- Key data points -->
    <circle cx="0" cy="237" r="4" fill="#22c55e"/>
    <text x="5" y="225" font-family="Segoe UI, sans-serif" font-size="8" fill="#86efac">Rp 8 M</text>
    
    <circle cx="320" cy="192" r="4" fill="#22c55e"/>
    <text x="325" y="185" font-family="Segoe UI, sans-serif" font-size="8" fill="#86efac">Rp 402 M</text>

    <circle cx="640" cy="8" r="5" fill="#22c55e"/>
    <text x="600" y="18" font-family="Segoe UI, sans-serif" font-size="9" fill="#86efac">Rp 19,3 T</text>

    <circle cx="640" cy="72" r="4" fill="#fbbf24"/>
    <text x="580" y="102" font-family="Segoe UI, sans-serif" font-size="9" fill="#fcd34d">Rp 9,9 T (SHU)</text>
  </g>

  <text x="40" y="366" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b">Skenario moderat (60% rate konversi). Sum bu X = log scale (10 > 50 > 500 > 5.000 > 24.000). Lihat ROI_ANALYSIS.md §VI.</text>
</svg>
