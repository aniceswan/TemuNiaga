<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="red-box" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1a" />
      <stop offset="100%" stop-color="#450a0a" />
    </linearGradient>
    <linearGradient id="green-box" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065f46" />
      <stop offset="100%" stop-color="#042f2e" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)" />

  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="600" y="45" fill="#ffffff" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="1">TRANSFORMASI STRUKTUR PASAR: TENGKULAK vs KOPERASI</text>
    <text x="600" y="75" fill="#94a3b8" font-size="16" font-weight="500" text-anchor="middle">Teori Countervailing Power (John Kenneth Galbraith) &amp; Transaksi Biaya (Coase/Williamson)</text>

    <!-- LEFT SIDE: OLD STRUCTURE (OLIGOPSONI) -->
    <g transform="translate(30, 110)">
      <rect x="0" y="0" width="550" height="440" rx="16" fill="url(#red-box)" stroke="#ef4444" stroke-width="2" filter="url(#shadow)" />
      
      <rect x="20" y="20" width="510" height="40" rx="8" fill="#991b1b" />
      <text x="275" y="46" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">SISTEM LAMA: OLIGOPSONI TENGKULAK</text>

      <!-- Farmers Box -->
      <g transform="translate(20, 90)">
        <rect x="0" y="0" width="120" height="125" rx="8" fill="#27272a" stroke="#52525b" stroke-width="1.5" />
        <text x="60" y="35" fill="#f87171" font-size="14" font-weight="700" text-anchor="middle">Petani / UMKM</text>
        <text x="60" y="62" fill="#94a3b8" font-size="11.5" text-anchor="middle">Banyak Penjual</text>
        <text x="60" y="84" fill="#94a3b8" font-size="11.5" text-anchor="middle">Skala &lt; MOQ</text>
        <text x="60" y="106" fill="#ef4444" font-size="12.5" font-weight="700" text-anchor="middle">(Price Taker)</text>
      </g>

      <!-- Connecting Arrow 1 -->
      <g transform="translate(140, 135)">
        <line x1="5" y1="15" x2="65" y2="15" stroke="#ef4444" stroke-width="3" stroke-dasharray="4" />
        <polygon points="65,10 75,15 65,20" fill="#ef4444" />
        <text x="37.5" y="-5" fill="#fca5a5" font-size="11" text-anchor="middle">Asimetri</text>
        <text x="37.5" y="38" fill="#fca5a5" font-size="11" text-anchor="middle">Informasi</text>
      </g>

      <!-- Tengkulak Box -->
      <g transform="translate(215, 90)">
        <rect x="0" y="0" width="120" height="125" rx="8" fill="#7f1d1a" stroke="#ef4444" stroke-width="2" filter="url(#shadow)" />
        <text x="60" y="35" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Tengkulak</text>
        <text x="60" y="62" fill="#fca5a5" font-size="11.5" text-anchor="middle">Sedikit Pengepul</text>
        <text x="60" y="84" fill="#fca5a5" font-size="11.5" text-anchor="middle">Kuasai Informasi</text>
        <text x="60" y="106" fill="#fbbf24" font-size="12.5" font-weight="700" text-anchor="middle">(Oligopsoni)</text>
      </g>

      <!-- Connecting Arrow 2 -->
      <g transform="translate(335, 135)">
        <line x1="5" y1="15" x2="70" y2="15" stroke="#ef4444" stroke-width="3" />
        <polygon points="70,10 80,15 70,20" fill="#ef4444" />
        <text x="40" y="-5" fill="#fca5a5" font-size="11" text-anchor="middle">Rantai</text>
        <text x="40" y="38" fill="#fca5a5" font-size="11" text-anchor="middle">7-9 Lapis</text>
      </g>

      <!-- Big Buyer Box -->
      <g transform="translate(415, 90)">
        <rect x="0" y="0" width="115" height="125" rx="8" fill="#3f3f46" stroke="#71717a" stroke-width="1.5" />
        <text x="57.5" y="42" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Pembeli Besar</text>
        <text x="57.5" y="66" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">B2B / Kota</text>
        <text x="57.5" y="94" fill="#94a3b8" font-size="12" text-anchor="middle">Pabrik &amp; Ritel</text>
      </g>

      <!-- Explanation Bullet Points -->
      <g transform="translate(30, 260)" font-size="13.5" fill="#fecaca">
        <g transform="translate(0, 0)">
          <circle cx="8" cy="-4" r="4" fill="#ef4444" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Farmer's Share Rendah:</tspan> Kopi Solok hanya 32% ke petani.</text>
        </g>
        <g transform="translate(0, 32)">
          <circle cx="8" cy="-4" r="4" fill="#ef4444" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Bocor di Perantara:</tspan> Sekitar Rp313 Triliun/thn mengendap di rantai.</text>
        </g>
        <g transform="translate(0, 64)">
          <circle cx="8" cy="-4" r="4" fill="#ef4444" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Petani Price-Taker:</tspan> Tidak memiliki akses informasi harga grosir.</text>
        </g>
        <g transform="translate(0, 96)">
          <circle cx="8" cy="-4" r="4" fill="#ef4444" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Halal 2026 Terancam:</tspan> UMKM mikro kesulitan mengurus mandiri.</text>
        </g>
        <g transform="translate(0, 128)">
          <circle cx="8" cy="-4" r="4" fill="#ef4444" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Distress di Farmgate:</tspan> Harga singkong sempat anjlok ke Rp1.000/kg.</text>
        </g>
      </g>
    </g>

    <!-- RIGHT SIDE: NEW STRUCTURE (TEMUNIAGA) -->
    <g transform="translate(620, 110)">
      <rect x="0" y="0" width="550" height="440" rx="16" fill="url(#green-box)" stroke="#10b981" stroke-width="2" filter="url(#shadow)" />
      
      <rect x="20" y="20" width="510" height="40" rx="8" fill="#047857" />
      <text x="275" y="46" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">SISTEM BARU: KOPERASI DESA (TEMUNIAGA)</text>

      <!-- Farmers Box -->
      <g transform="translate(20, 90)">
        <rect x="0" y="0" width="120" height="125" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
        <text x="60" y="35" fill="#38bdf8" font-size="14" font-weight="700" text-anchor="middle">Petani &amp; UMKM</text>
        <text x="60" y="62" fill="#94a3b8" font-size="11.5" text-anchor="middle">Residual Claimant</text>
        <text x="60" y="84" fill="#94a3b8" font-size="11.5" text-anchor="middle">Terima Talangan</text>
        <text x="60" y="106" fill="#10b981" font-size="12.5" font-weight="700" text-anchor="middle">(Tunai Cepat)</text>
      </g>

      <!-- Connecting Arrow 1 -->
      <g transform="translate(140, 135)">
        <line x1="5" y1="15" x2="65" y2="15" stroke="#10b981" stroke-width="3" />
        <polygon points="65,10 75,15 65,20" fill="#10b981" />
        <text x="37.5" y="-5" fill="#a7f3d0" font-size="11" text-anchor="middle">Agregasi</text>
        <text x="37.5" y="38" fill="#a7f3d0" font-size="11" text-anchor="middle">Kolektif</text>
      </g>

      <!-- Koperasi Box -->
      <g transform="translate(215, 80)">
        <rect x="0" y="0" width="170" height="145" rx="12" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)" />
        <text x="85" y="28" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle">KOPERASI DESA</text>
        <rect x="15" y="40" width="140" height="24" rx="4" fill="#0f172a" />
        <text x="85" y="56" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">Badan Hukum Adil</text>
        <text x="85" y="84" fill="#dbeafe" font-size="11.5" font-weight="600" text-anchor="middle">Harga Terbuka BPS</text>
        <text x="85" y="105" fill="#dbeafe" font-size="11.5" font-weight="600" text-anchor="middle">Pencocokan RFQ B2B</text>
        <text x="85" y="126" fill="#dbeafe" font-size="11.5" font-weight="600" text-anchor="middle">Ledger Transparan</text>
      </g>

      <!-- Connecting Arrow 2 -->
      <g transform="translate(385, 135)">
        <line x1="5" y1="15" x2="60" y2="15" stroke="#fbbf24" stroke-width="4" />
        <polygon points="60,8 70,15 60,22" fill="#fbbf24" />
        <text x="35" y="-5" fill="#fde68a" font-size="11" font-weight="700" text-anchor="middle">Volume</text>
        <text x="35" y="38" fill="#fde68a" font-size="11" font-weight="700" text-anchor="middle">MOQ Pabrik</text>
      </g>

      <!-- Big Buyer Box -->
      <g transform="translate(455, 90)">
        <rect x="0" y="0" width="75" height="125" rx="8" fill="#78350f" stroke="#fbbf24" stroke-width="2" filter="url(#shadow)" />
        <text x="37.5" y="35" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Pembeli</text>
        <text x="37.5" y="55" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Besar B2B</text>
        <text x="37.5" y="80" fill="#fde68a" font-size="11" text-anchor="middle">Pabrik/Bulog</text>
        <text x="37.5" y="100" fill="#fde68a" font-size="11" text-anchor="middle">Ritel/Ekspor</text>
      </g>

      <!-- Explanation Bullet Points -->
      <g transform="translate(30, 260)" font-size="13.5" fill="#d1fae5">
        <g transform="translate(0, 0)">
          <circle cx="8" cy="-4" r="4" fill="#10b981" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Farmer's Share Tinggi:</tspan> Memangkas rantai, potensi naik 10-15%.</text>
        </g>
        <g transform="translate(0, 32)">
          <circle cx="8" cy="-4" r="4" fill="#10b981" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Harga Adil Bukti Data:</tspan> Integrasi WebAPI BPS dan Bapanas.</text>
        </g>
        <g transform="translate(0, 64)">
          <circle cx="8" cy="-4" r="4" fill="#10b981" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Uang Tunai Cepat:</tspan> Didanai modal kerja PMK 49/2025.</text>
        </g>
        <g transform="translate(0, 96)">
          <circle cx="8" cy="-4" r="4" fill="#10b981" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Bebas Korupsi Pengurus:</tspan> Ledger terbuka, transparansi harga jual.</text>
        </g>
        <g transform="translate(0, 128)">
          <circle cx="8" cy="-4" r="4" fill="#10b981" />
          <text x="24" y="0"><tspan font-weight="700" fill="#ffffff">Payung Legal UMKM:</tspan> Koperasi memfasilitasi sertifikasi Halal 2026.</text>
        </g>
      </g>
    </g>

    <!-- CONCEPT PREVIEW NOTE -->
    <text x="600" y="595" fill="#64748b" font-size="13" font-weight="500" text-anchor="middle">* Catatan: Grafik rantai pasok ini adalah ilustrasi pratinjau konsep (concept preview) operasional, bukan representasi antarmuka final.</text>
  </g>
</svg>
